name: CI Pipline

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: 
          node-version: 24.14.1

      - name: Install Dependencies
        run: npm ci
      
      - name: Run Tests
        run: npm test      

      - name: Build Docker image
        run: docker build -t task-manager-api .